spring:
  application:
    name: paint-and-petals-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/paintandpetals}
    username: ${SPRING_DATASOURCE_USERNAME:pp_user}
    password: ${SPRING_DATASOURCE_PASSWORD:pp_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-min-32-characters-long!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin:
    email: ${ADMIN_EMAIL:admin@paintandpetals.com}
    password: ${ADMIN_PASSWORD:Admin@PaintPetals2024!}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

logging:
  level:
    com.paintandpetals: INFO
    org.springframework.security: WARN
